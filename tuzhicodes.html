<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TuZhi Gamerz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --card:   #18182e;
      --card2:  #1f1f3a;
      --border: rgba(120,100,255,0.15);
      --txt1:   #f0eeff;
      --txt2:   #a09cc0;
      --accent: #7c6ef7;
      --r:      18px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: #0d0d1a;
      min-height: 100vh;
      display: flex; justify-content: center; align-items: flex-start;
      padding: clamp(12px, 4vw, 30px) clamp(8px, 3vw, 16px) 60px;
      overflow-x: hidden;
    }

    /* ── STARS ── */
    #particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .star {
      position:absolute; border-radius:50%; opacity:0;
      animation: tw var(--d,3s) var(--e,0s) infinite;
    }
    @keyframes tw {
      0%,100%{ opacity:0; }
      50%    { opacity:var(--b,.5); }
    }

    /* ── CARD ── */
    .profile-card {
      position:relative; z-index:1;
      width:100%; max-width:min(420px, 100%);
      background: var(--card);
      border-radius: var(--r);
      border: 1px solid var(--border);
      overflow: visible;          /* MUST be visible for deco bleed */
      box-shadow: 0 8px 60px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.04);
      animation: cardIn .65s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(36px) scale(.97); }
      to   { opacity:1; transform:translateY(0)    scale(1);   }
    }

    /* ── BANNER ── */
    .banner {
      width:100%;
      height: clamp(110px, 30vw, 155px);
      background: linear-gradient(135deg,#ff6b9d,#8e44ad,#5865f2);
      border-radius: var(--r) var(--r) 0 0;
      overflow: hidden; position:relative;
    }
    .banner img {
      width:100%; height:100%; object-fit:cover; display:block;
      transition: transform .6s;
    }
    .banner:hover img { transform:scale(1.05); }
    .shimmer {
      position:absolute; inset:0;
      background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.07) 50%,transparent 60%);
      animation:sh 3.5s infinite;
    }
    @keyframes sh { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

    /* ─────────────────────────────────────────
       AVATAR SYSTEM — clean simple approach

       .av-wrap = exactly 100×100px (avatar size)
       deco imgs = 160×160, placed top:-30 left:-30
                   so they naturally bleed 30px outside
       z-order:
         deco-bot   z:1  (behind avatar)
         .av-wrap   z:2  (avatar circle)
         deco-top   z:3  (front, center masked)
         status-dot z:4  (always on top)
    ───────────────────────────────────────── */
    .avatar-row {
      padding: 0 clamp(14px,4vw,20px);
      margin-top: clamp(-40px,-10vw,-48px);
      display: flex; align-items: flex-end;
      gap: clamp(10px,3vw,14px);
    }

    /* wrapper = avatar size exactly, overflow:visible so deco bleeds */
    .av-wrap {
      position: relative;
      width: 100px; height: 100px;
      flex-shrink: 0;
      z-index: 2;           /* sits above deco-bot */
      overflow: visible;
      margin-bottom: 10px;
    }

    /* the actual circle */
    .av-circle {
      width: 100%; height: 100%;
      border-radius: 50%;
      border: 4px solid var(--card);
      background: var(--card2);
      overflow: hidden;
      box-shadow: 0 0 24px rgba(0,0,0,.6), 0 0 0 2.5px var(--accent);
      animation: pop .8s .2s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes pop {
      from { opacity:0; transform:scale(.55); }
      to   { opacity:1; transform:scale(1); }
    }
    .av-circle img { width:100%; height:100%; object-fit:cover; display:block; }

    /* ── DECORATION IMAGES ── */
    /*
      Both deco-bot and deco-top are 160×160.
      top:-30px; left:-30px centres them on the 100px av-wrap.
      deco-bot  z:1  → behind av-wrap (z:2) — shows behind avatar face
      deco-top  z:3  → above  av-wrap (z:2) — mask punches hole at centre
                        so avatar face shows through, outer ring visible
    */
    .deco {
      position: absolute;
      width: 160px; height: 160px;
      top: -30px; left: -30px;          /* centre 160px over 100px: (160-100)/2 = 30 */
      pointer-events: none;
      object-fit: contain;
      animation: pop .8s .28s cubic-bezier(.16,1,.3,1) both;
    }
    /* behind avatar */
    .deco-bot { z-index: -1; }          /* negative so it goes behind av-wrap z:2 */

    /* in front: mask punches 50px hole at image-centre (80px,80px)
       80px into the 160px image = avatar centre                    */
    .deco-top {
      z-index: 3;
      -webkit-mask: radial-gradient(circle 50px at 80px 80px, transparent 49px, black 50px);
              mask: radial-gradient(circle 50px at 80px 80px, transparent 49px, black 50px);
    }

    /* ── STATUS DOT — Discord accurate ── */
    .status-dot {
      position: absolute;
      bottom: -4px; right: -4px;
      z-index: 4;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--card);
      border: 3px solid var(--card);
      display: flex; align-items: center; justify-content: center;
    }
    .status-dot svg { display:block; }

    /* pulse ring (only without deco) */
    .no-deco .av-wrap::after {
      content:'';
      position:absolute; inset:-6px;
      border-radius:50%;
      border:2px solid var(--accent);
      opacity:0;
      animation:pulse 2.5s ease-out infinite;
      pointer-events:none;
    }
    @keyframes pulse {
      0%   { opacity:.55; transform:scale(.94); }
      100% { opacity:0;   transform:scale(1.18); }
    }

    /* ── STATUS BUBBLE ── */
    .status-bubble {
      flex: 1; min-width: 0;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: clamp(8px,2vw,11px) clamp(10px,3vw,14px);
      margin-bottom: 10px;
      font-size: clamp(11px,3vw,13px);
      color: var(--txt2);
      line-height: 1.45; word-break: break-word;
      align-self: center;
      animation: sldIn .65s .3s both;
    }
    @keyframes sldIn {
      from { opacity:0; transform:translateX(14px); }
      to   { opacity:1; transform:translateX(0); }
    }

    /* ── PROFILE BODY ── */
    .profile-body {
      padding: clamp(14px,4vw,18px) clamp(14px,4vw,20px) clamp(18px,5vw,24px);
    }

    .display-name {
      font-size: clamp(20px,6vw,26px);
      font-weight: 900; color: var(--txt1);
      letter-spacing: -.4px;
      animation: up .45s .38s both;
    }
    .meta-row {
      display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
      margin: 4px 0 14px;
      font-size: clamp(12px,3.5vw,14px); color: var(--txt2);
      animation: up .45s .45s both;
    }
    .meta-sep { opacity:.35; }

    @keyframes up {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── ABOUT ── */
    .about-box {
      background: var(--card2); border:1px solid var(--border);
      border-radius: 12px;
      padding: clamp(10px,3vw,14px) clamp(12px,3.5vw,16px);
      margin-bottom: 16px;
      animation: up .45s .52s both;
    }
    .about-label {
      font-size: 10px; font-weight:800; color:var(--txt2);
      text-transform:uppercase; letter-spacing:1.1px; margin-bottom:7px;
    }
    .about-text {
      font-size: clamp(12px,3.5vw,14px); color:var(--txt1);
      line-height:1.6; white-space:pre-wrap;
    }

    /* ── BADGES ── */
    .badges-wrap {
      display: flex; flex-wrap:wrap;
      gap: clamp(5px,1.5vw,8px);
      margin-bottom: 16px;
      animation: up .45s .58s both;
    }
    .badge-item {
      width: clamp(30px,8vw,36px); height:clamp(30px,8vw,36px);
      border-radius: 9px;
      background:var(--card2); border:1px solid var(--border);
      overflow:hidden; cursor:pointer;
      transition: transform .18s, box-shadow .18s;
      display:flex; align-items:center; justify-content:center; padding:3px;
    }
    .badge-item img { width:100%; height:100%; object-fit:contain; display:block; }
    .badge-item:hover {
      transform:translateY(-4px) scale(1.1);
      box-shadow:0 8px 18px rgba(0,0,0,.4), 0 0 0 2px var(--accent);
    }

    /* ── BADGE TOOLTIP ── */
    .badge-tooltip {
      position:fixed; top:16px; left:50%;
      transform:translateX(-50%) translateY(-70px);
      background:var(--card2); border:1px solid var(--border);
      border-radius:13px; padding:11px 18px;
      display:flex; align-items:center; gap:10px;
      box-shadow:0 10px 36px rgba(0,0,0,.55);
      z-index:9999; opacity:0;
      transition:all .3s cubic-bezier(.16,1,.3,1); pointer-events:none;
      max-width: calc(100vw - 32px);
    }
    .badge-tooltip.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .badge-tooltip img  { width:32px; height:32px; object-fit:contain; flex-shrink:0; }
    .badge-tooltip span { font-size:14px; font-weight:700; color:var(--txt1); white-space:nowrap; }

    /* ── BUTTONS ── */
    .buttons-wrap {
      display:flex; flex-direction:column;
      gap: clamp(8px,2vw,10px);
      margin-bottom: 16px;
      animation: up .45s .64s both;
    }
    .profile-btn {
      display:flex; align-items:center; justify-content:center; gap:9px;
      padding: clamp(11px,3vw,13px) 18px;
      border-radius:50px;
      font-size: clamp(13px,3.8vw,15px); font-weight:800; color:white;
      text-decoration:none; border:none; cursor:pointer;
      transition:transform .22s, filter .22s;
      position:relative; overflow:hidden;
    }
    .profile-btn::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(180deg,rgba(255,255,255,.13) 0%,transparent 55%);
      pointer-events:none;
    }
    .profile-btn:hover  { transform:translateY(-3px); filter:brightness(1.12); }
    .profile-btn:active { transform:translateY(0) scale(.97); }
    .profile-btn i { font-size:clamp(14px,4vw,16px); }

    /* ── FOOTER ── */
    .profile-footer {
      border-top: 1px solid var(--border);
      padding: clamp(10px,3vw,14px) 20px;
      text-align:center;
      font-size: clamp(10px,3vw,12px); color:var(--txt2);
      border-radius: 0 0 var(--r) var(--r);
      animation: up .45s .7s both;
    }

    /* ── SKELETON ── */
    .sk {
      background:linear-gradient(90deg,var(--card2) 25%,rgba(255,255,255,.04) 50%,var(--card2) 75%);
      background-size:200% 100%; animation:sk 1.3s infinite; border-radius:8px;
    }
    @keyframes sk { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>

<div id="particles"></div>

<!-- Badge tooltip -->
<div class="badge-tooltip" id="tt">
  <img id="ttImg" src="" alt=""/>
  <span id="ttName"></span>
</div>

<!-- Card skeleton while loading -->
<div class="profile-card" id="card">
  <div class="banner"><div class="sk" style="width:100%;height:140px;border-radius:0;"></div></div>
  <div style="padding:0 18px;margin-top:-46px;display:flex;align-items:flex-end;gap:12px;">
    <div class="sk" style="width:100px;height:100px;border-radius:50%;flex-shrink:0;"></div>
    <div class="sk" style="flex:1;height:50px;border-radius:12px;margin-bottom:10px;"></div>
  </div>
  <div style="padding:16px 18px 22px;">
    <div class="sk" style="width:55%;height:28px;margin-bottom:9px;"></div>
    <div class="sk" style="width:38%;height:14px;margin-bottom:18px;"></div>
    <div style="display:flex;gap:7px;margin-bottom:16px;">
      <div class="sk" style="width:34px;height:34px;border-radius:9px;"></div>
      <div class="sk" style="width:34px;height:34px;border-radius:9px;"></div>
      <div class="sk" style="width:34px;height:34px;border-radius:9px;"></div>
    </div>
    <div class="sk" style="height:44px;border-radius:50px;margin-bottom:9px;"></div>
    <div class="sk" style="height:44px;border-radius:50px;margin-bottom:9px;"></div>
  </div>
</div>

<script>
/* ── STARS ── */
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<110;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()<.25?3:2;
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--d:${2+Math.random()*4}s;--e:${Math.random()*6}s;--b:${.25+Math.random()*.65};`;
    c.appendChild(s);
  }
})();

/* ── STATUS SVG — exact Discord style ── */
function statusSVG(type){
  const BG='#18182e';
  const m={
    online:   `<circle cx="8" cy="8" r="8" fill="#3ba55d"/>`,
    dnd:      `<circle cx="8" cy="8" r="8" fill="#ed4245"/><rect x="3" y="6.4" width="10" height="3.2" rx="1.6" fill="#fff"/>`,
    idle:     `<circle cx="8" cy="8" r="8" fill="#faa61a"/><circle cx="5" cy="4.5" r="7" fill="${BG}"/>`,
    offline:  `<circle cx="8" cy="8" r="8" fill="#747f8d"/><circle cx="8" cy="8" r="3.5" fill="${BG}"/>`,
    streaming:`<circle cx="8" cy="8" r="8" fill="#593695"/><polygon points="5.5,4.5 5.5,11.5 12,8" fill="#fff"/>`,
  };
  return `<div class="status-dot"><svg width="16" height="16" viewBox="0 0 16 16">${m[type]||m.offline}</svg></div>`;
}

/* ══════════════════════════════════════════
   DECORATION SYSTEM
   ══════════════════════════════════════════
   A) IMAGE FILE — put in deco/ folder
      { "file": "catuki.png", "layer": "frame" }

   B) BUILT-IN animated — no upload needed
      { "file": "blue-ring" }
      Available: blue-ring | purple-ring | gold-ring | fire-ring | rainbow-ring
   ═══════════════════════════════════════════ */
const BUILTINS=['blue-ring','purple-ring','gold-ring','fire-ring','rainbow-ring','text-orbit','glitch-ring','spooky-ring'];

function buildDeco(d){
  if(!d||!d.file) return {bot:'',top:'',canvas:false,active:false};
  const name=d.file.trim();

  if(BUILTINS.includes(name)){
    const canvasHTML=`<canvas id="decoCanvas" width="160" height="160"
      style="position:absolute;top:-30px;left:-30px;width:160px;height:160px;
             pointer-events:none;z-index:3;"></canvas>`;
    return {bot:'',top:canvasHTML,canvas:name,active:true};
  }

  const src='deco/'+name;
  const lyr=(d.layer||'frame').toLowerCase();
  const el=cls=>`<img class="deco ${cls}" src="${src}" alt="" onerror="this.style.display='none'"/>`;
  if(lyr==='frame') return {bot:el('deco-bot'),top:el('deco-top'),canvas:false,active:true};
  if(lyr==='under') return {bot:el('deco-bot'),top:'',canvas:false,active:true};
  return {bot:'',top:el('deco-top'),canvas:false,active:true};
}

/* Dynamically load deco/<name>.js and run it */
function startDecoCanvas(name){
  /* remove old script tag if any */
  const old=document.getElementById('decoScript');
  if(old) old.remove();
  const s=document.createElement('script');
  s.id='decoScript';
  s.src='deco/'+name+'.js?t='+Date.now();
  document.body.appendChild(s);
}


/* ── RENDER ── */
function render(p){
  /* cancel any previous canvas loop */
  if(window._decoRaf) cancelAnimationFrame(window._decoRaf);

  const card=document.getElementById('card');
  const st=(p.status?.type||'dnd').toLowerCase();
  const deco=buildDeco(p.decoration);

  card.innerHTML=`
    <div class="banner">
      <img src="${p.banner}" alt="" onerror="this.style.display='none'"/>
      <div class="shimmer"></div>
    </div>

    <div class="avatar-row">
      <div class="${deco.active?'':'no-deco'}">
        ${deco.bot}
        <div class="av-wrap">
          <div class="av-circle">
            <img src="${p.avatar}" alt="" onerror="this.style.display='none'"/>
          </div>
          ${deco.top}
          ${statusSVG(st)}
        </div>
      </div>
      <div class="status-bubble">${p.status?.text||''}</div>
    </div>

    <div class="profile-body">
      <div class="display-name">${p.name}</div>
      <div class="meta-row">
        <span>${p.username}</span>
        <span class="meta-sep">•</span>
        <span>${p.nickname}</span>
      </div>

      ${p.badges?.length?`
      <div class="badges-wrap">
        ${p.badges.map((b,i)=>`
          <div class="badge-item" style="animation:up .38s ${.52+i*.055}s both;"
               onclick="tip('${xQ(b.name)}','${xQ(b.image)}','${xQ(b.color||'#7c6ef7')}')">
            <img src="${b.image}" alt="${xQ(b.name)}" onerror="this.style.opacity='.25'"/>
          </div>`).join('')}
      </div>`:''}

      <div class="about-box">
        <div class="about-label">About Me</div>
        <div class="about-text">${xH(p.about||'')}</div>
      </div>

      ${p.buttons?.length?`
      <div class="buttons-wrap">
        ${p.buttons.map((b,i)=>`
          <a href="${b.link}" target="_blank" rel="noopener" class="profile-btn"
             style="background:linear-gradient(135deg,${b.gradient?.[0]||'#7c6ef7'},${b.gradient?.[1]||'#5865f2'});
                    box-shadow:0 5px 18px ${b.glow||'rgba(124,110,247,.3)'};
                    animation:up .38s ${.64+i*.07}s both;">
            <i class="${b.icon||'fas fa-link'}"></i>${xH(b.name)}
          </a>`).join('')}
      </div>`:''}
    </div>

    ${p.footer?`<div class="profile-footer">${xH(p.footer)}</div>`:''}
  `;

  /* start canvas animation if built-in deco */
  if(deco.canvas) startDecoCanvas(deco.canvas);
}

/* ── TOOLTIP ── */
let tTimer;
function tip(name,img,color){
  const t=document.getElementById('tt');
  document.getElementById('ttImg').src=img;
  document.getElementById('ttName').textContent=name;
  t.style.borderColor=color+'44';
  t.classList.add('show');
  clearTimeout(tTimer);
  tTimer=setTimeout(()=>t.classList.remove('show'),3000);
}

/* ── UTILS ── */
function xQ(s){return String(s||'').replace(/'/g,"&#39;").replace(/"/g,"&quot;");}
function xH(s){return String(s||'').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

/* ── LOAD ── */
fetch('./data.json')
  .then(r=>{if(!r.ok)throw r.status;return r.json();})
  .then(d=>render(d.profile))
  .catch(e=>{
    console.error('data.json:',e);
    render({name:"MAJID",username:"!  MAJID",nickname:"!  MAJID",
      avatar:"",banner:"",status:{text:"Status",type:"dnd"},
      badges:[],buttons:[],about:"data.json load error.",footer:""});
  });
</script>
</body>
</html>
